<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#334155"/>
    </linearGradient>
    <linearGradient id="sidebarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <filter id="chipShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#e2e8f0" rx="8"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="56" fill="url(#headerGrad)" rx="8"/>
  <rect x="0" y="48" width="1200" height="8" fill="url(#headerGrad)"/>

  <!-- Logo -->
  <text x="20" y="36" fill="#ffffff" font-size="22" font-weight="700">Tabulator</text>
  <text x="140" y="34" fill="#94a3b8" font-size="12">Cross-tabulation Tool</text>

  <!-- Header buttons -->
  <rect x="980" y="12" width="100" height="32" fill="#3b82f6" rx="6"/>
  <text x="1030" y="32" fill="#ffffff" font-size="13" font-weight="500" text-anchor="middle">Load Data</text>

  <rect x="1090" y="12" width="40" height="32" fill="#475569" rx="6"/>
  <text x="1110" y="32" fill="#ffffff" font-size="16" text-anchor="middle">⚙</text>

  <!-- Left Panel -->
  <rect x="0" y="56" width="280" height="744" fill="url(#sidebarGrad)"/>
  <line x1="280" y1="56" x2="280" y2="800" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Tables Section -->
  <rect x="12" y="68" width="256" height="280" fill="#ffffff" rx="8" filter="url(#shadow)"/>
  <text x="24" y="92" fill="#1e293b" font-size="14" font-weight="600">Tables</text>

  <!-- Table items -->
  <rect x="24" y="108" width="232" height="36" fill="#eff6ff" rx="6" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="40" cy="126" r="5" fill="#3b82f6"/>
  <text x="56" y="131" fill="#1e293b" font-size="13" font-weight="500">Table 1</text>
  <text x="240" y="131" fill="#94a3b8" font-size="11" text-anchor="end">Q1 × Gender</text>

  <rect x="24" y="152" width="232" height="36" fill="#ffffff" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="40" cy="170" r="5" fill="#cbd5e1"/>
  <text x="56" y="175" fill="#1e293b" font-size="13">Table 2</text>
  <text x="240" y="175" fill="#94a3b8" font-size="11" text-anchor="end">Q2 × Age</text>

  <rect x="24" y="196" width="232" height="36" fill="#ffffff" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="40" cy="214" r="5" fill="#cbd5e1"/>
  <text x="56" y="219" fill="#1e293b" font-size="13">Table 3</text>
  <text x="240" y="219" fill="#94a3b8" font-size="11" text-anchor="end">—</text>

  <!-- New Table Button -->
  <rect x="24" y="252" width="232" height="36" fill="#f1f5f9" rx="6" stroke-dasharray="4 2" stroke="#cbd5e1" stroke-width="1"/>
  <text x="140" y="275" fill="#64748b" font-size="13" text-anchor="middle">+ New Table</text>

  <!-- Variables Section -->
  <rect x="12" y="360" width="256" height="420" fill="#ffffff" rx="8" filter="url(#shadow)"/>
  <text x="24" y="384" fill="#1e293b" font-size="14" font-weight="600">Variables</text>
  <text x="240" y="384" fill="#94a3b8" font-size="11" text-anchor="end">7 items</text>

  <!-- Variable items (draggable) -->
  <rect x="24" y="396" width="232" height="40" fill="#f0fdf4" rx="6" stroke="#86efac" stroke-width="1"/>
  <text x="36" y="421" fill="#166534" font-size="13" font-weight="500">Gender</text>
  <text x="240" y="421" fill="#86efac" font-size="11" text-anchor="end">⠿ drag</text>

  <rect x="24" y="442" width="232" height="40" fill="#f0fdf4" rx="6" stroke="#86efac" stroke-width="1"/>
  <text x="36" y="467" fill="#166534" font-size="13" font-weight="500">Age</text>
  <text x="240" y="467" fill="#86efac" font-size="11" text-anchor="end">⠿ drag</text>

  <rect x="24" y="488" width="232" height="40" fill="#f0fdf4" rx="6" stroke="#86efac" stroke-width="1"/>
  <text x="36" y="513" fill="#166534" font-size="13" font-weight="500">Q1</text>
  <text x="240" y="513" fill="#86efac" font-size="11" text-anchor="end">⠿ drag</text>

  <rect x="24" y="534" width="232" height="40" fill="#f0fdf4" rx="6" stroke="#86efac" stroke-width="1"/>
  <text x="36" y="559" fill="#166534" font-size="13" font-weight="500">Q2</text>
  <text x="240" y="559" fill="#86efac" font-size="11" text-anchor="end">⠿ drag</text>

  <rect x="24" y="580" width="232" height="40" fill="#f0fdf4" rx="6" stroke="#86efac" stroke-width="1"/>
  <text x="36" y="605" fill="#166534" font-size="13" font-weight="500">Q3</text>
  <text x="240" y="605" fill="#86efac" font-size="11" text-anchor="end">⠿ drag</text>

  <rect x="24" y="626" width="232" height="40" fill="#f0fdf4" rx="6" stroke="#86efac" stroke-width="1"/>
  <text x="36" y="651" fill="#166534" font-size="13" font-weight="500">Weight</text>
  <text x="240" y="651" fill="#86efac" font-size="11" text-anchor="end">⠿ drag</text>

  <!-- Right Panel -->
  <rect x="280" y="56" width="920" height="744" fill="url(#mainGrad)"/>

  <!-- Tabs -->
  <rect x="292" y="68" width="90" height="36" fill="#3b82f6" rx="6"/>
  <text x="337" y="91" fill="#ffffff" font-size="13" font-weight="600" text-anchor="middle">Build</text>

  <rect x="390" y="68" width="90" height="36" fill="#f1f5f9" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <text x="435" y="91" fill="#64748b" font-size="13" text-anchor="middle">Filter</text>

  <rect x="488" y="68" width="90" height="36" fill="#f1f5f9" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <text x="533" y="91" fill="#64748b" font-size="13" text-anchor="middle">Result</text>

  <!-- Column Drop Zone -->
  <rect x="400" y="120" width="780" height="80" fill="#fef3c7" rx="8" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="420" y="142" fill="#92400e" font-size="12" font-weight="600">COLUMN DROP ZONE</text>
  <text x="420" y="158" fill="#b45309" font-size="11">Drag variables here to add as columns</text>

  <!-- Column chips (example) -->
  <rect x="420" y="168" width="80" height="28" fill="#ffffff" rx="14" filter="url(#chipShadow)"/>
  <text x="460" y="187" fill="#1e293b" font-size="12" text-anchor="middle">Q1/1</text>
  <text x="492" y="187" fill="#ef4444" font-size="10">×</text>

  <rect x="510" y="168" width="80" height="28" fill="#ffffff" rx="14" filter="url(#chipShadow)"/>
  <text x="550" y="187" fill="#1e293b" font-size="12" text-anchor="middle">Q2/2</text>
  <text x="582" y="187" fill="#ef4444" font-size="10">×</text>

  <rect x="600" y="168" width="60" height="28" fill="#f1f5f9" rx="14" stroke-dasharray="3 2" stroke="#cbd5e1"/>
  <text x="630" y="187" fill="#64748b" font-size="16" text-anchor="middle">+</text>

  <!-- Row Drop Zone -->
  <rect x="400" y="220" width="120" height="520" fill="#dbeafe" rx="8" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="460" y="250" fill="#1e40af" font-size="12" font-weight="600" text-anchor="middle">ROW</text>
  <text x="460" y="266" fill="#3b82f6" font-size="10" text-anchor="middle">DROP</text>
  <text x="460" y="282" fill="#3b82f6" font-size="10" text-anchor="middle">ZONE</text>

  <!-- Row chips (example) -->
  <rect x="412" y="300" width="96" height="32" fill="#ffffff" rx="6" filter="url(#chipShadow)"/>
  <text x="460" y="321" fill="#1e293b" font-size="12" text-anchor="middle">Q1/1..3</text>
  <text x="500" y="321" fill="#ef4444" font-size="10">×</text>

  <rect x="412" y="340" width="96" height="32" fill="#ffffff" rx="6" filter="url(#chipShadow)"/>
  <text x="460" y="361" fill="#1e293b" font-size="12" text-anchor="middle">Q2/1+Q3/2</text>
  <text x="500" y="361" fill="#ef4444" font-size="10">×</text>

  <rect x="412" y="380" width="96" height="32" fill="#f1f5f9" rx="6" stroke-dasharray="3 2" stroke="#cbd5e1"/>
  <text x="460" y="400" fill="#64748b" font-size="16" text-anchor="middle">+</text>

  <!-- Grid Preview Area -->
  <rect x="540" y="220" width="640" height="520" fill="#f8fafc" rx="8" stroke="#e2e8f0" stroke-width="1"/>
  <text x="560" y="246" fill="#64748b" font-size="12" font-weight="500">Grid Preview</text>

  <!-- Grid table preview -->
  <rect x="560" y="260" width="600" height="460" fill="#ffffff" rx="4" stroke="#e2e8f0"/>

  <!-- Grid header row -->
  <rect x="560" y="260" width="160" height="40" fill="#f1f5f9"/>
  <rect x="720" y="260" width="140" height="40" fill="#fef3c7"/>
  <rect x="860" y="260" width="140" height="40" fill="#fef3c7"/>
  <rect x="1000" y="260" width="160" height="40" fill="#fef3c7"/>

  <text x="640" y="285" fill="#64748b" font-size="12" text-anchor="middle" font-weight="500">Row \ Column</text>
  <text x="790" y="285" fill="#92400e" font-size="12" text-anchor="middle" font-weight="500">Q1/1</text>
  <text x="930" y="285" fill="#92400e" font-size="12" text-anchor="middle" font-weight="500">Q2/2</text>
  <text x="1080" y="285" fill="#92400e" font-size="12" text-anchor="middle" font-weight="500">Total</text>

  <!-- Grid data rows -->
  <rect x="560" y="300" width="160" height="50" fill="#f0fdf4"/>
  <rect x="720" y="300" width="140" height="50" fill="#ffffff"/>
  <rect x="860" y="300" width="140" height="50" fill="#ffffff"/>
  <rect x="1000" y="300" width="160" height="50" fill="#f0fdf4"/>

  <text x="640" y="330" fill="#166534" font-size="12" text-anchor="middle" font-weight="500">Q1/1..3</text>
  <text x="790" y="330" fill="#94a3b8" font-size="14" text-anchor="middle">—</text>
  <text x="930" y="330" fill="#94a3b8" font-size="14" text-anchor="middle">—</text>
  <text x="1080" y="330" fill="#94a3b8" font-size="14" text-anchor="middle">—</text>

  <rect x="560" y="350" width="160" height="50" fill="#f0fdf4"/>
  <rect x="720" y="350" width="140" height="50" fill="#ffffff"/>
  <rect x="860" y="350" width="140" height="50" fill="#ffffff"/>
  <rect x="1000" y="350" width="160" height="50" fill="#f0fdf4"/>

  <text x="640" y="380" fill="#166534" font-size="12" text-anchor="middle" font-weight="500">Q2/1+Q3/2</text>
  <text x="790" y="380" fill="#94a3b8" font-size="14" text-anchor="middle">—</text>
  <text x="930" y="380" fill="#94a3b8" font-size="14" text-anchor="middle">—</text>
  <text x="1080" y="380" fill="#94a3b8" font-size="14" text-anchor="middle">—</text>

  <rect x="560" y="400" width="160" height="50" fill="#f0fdf4"/>
  <rect x="720" y="400" width="140" height="50" fill="#ffffff"/>
  <rect x="860" y="400" width="140" height="50" fill="#ffffff"/>
  <rect x="1000" y="400" width="160" height="50" fill="#f0fdf4"/>

  <text x="640" y="430" fill="#166534" font-size="12" text-anchor="middle" font-weight="500">Total</text>
  <text x="790" y="430" fill="#94a3b8" font-size="14" text-anchor="middle">—</text>
  <text x="930" y="430" fill="#94a3b8" font-size="14" text-anchor="middle">—</text>
  <text x="1080" y="430" fill="#94a3b8" font-size="14" text-anchor="middle">—</text>

  <!-- Drag arrow annotation -->
  <path d="M 260,500 Q 320,450 380,320" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  <text x="280" y="420" fill="#3b82f6" font-size="11" font-style="italic">Drag here</text>

  <!-- Bottom info -->
  <rect x="560" y="680" width="600" height="30" fill="#f8fafc" rx="4"/>
  <text x="860" y="700" fill="#94a3b8" font-size="11" text-anchor="middle">Drop variables to build your crosstab • Click chips to edit code definitions</text>
</svg>
